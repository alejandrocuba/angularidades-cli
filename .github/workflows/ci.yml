name: CI

on:
  push:
    branches: [main, cli-refactoring]
  pull_request:
    branches: [main]

# Enforce secure least-privilege permissions
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [format:check, lint, test]
    name: Validate (${{ matrix.task }})
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26.1.0
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Validate Task
        run: pnpm run ${{ matrix.task }}
