name: Update README YouTube Thumbnails

on:
  schedule:
    - cron: '0 */3 * * *' # Runs every 3 hours
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with latest YouTube videos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26.1.0

      - name: Run Update Script
        run: node .github/scripts/update-youtube-thumbnails.js

      - name: Commit and Push changes
        run: |
          if git diff --quiet README.md; then
            echo "No changes to README.md. Skipping commit."
            exit 0
          fi

          echo "Changes detected in README.md. Committing..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update latest youtube episodes in README.md [skip ci]"
          git push
